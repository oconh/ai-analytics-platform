version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: analytics-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-analytics}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: analytics-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-analytics}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_POOL_MIN_SIZE: 2
      DB_POOL_MAX_SIZE: 10
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - analytics-network
    command: sh -c "python -c 'from services.generator.db import init_db; init_db()' && python -m uvicorn services.api.main:app --host 0.0.0.0 --port 8000"

  # Event Generator
  generator:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: analytics-generator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-analytics}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - analytics-network
    command: python -m services.generator.generator

  # Angular Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: analytics-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - analytics-network
    environment:
      # Frontend environment variables (if needed)
      API_BASE_URL: http://backend:8000

volumes:
  postgres_data:
    driver: local

networks:
  analytics-network:
    driver: bridge
